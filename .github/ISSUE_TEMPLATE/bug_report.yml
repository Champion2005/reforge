name: Bug Report
description: Report a bug with Reforge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input String
      description: The raw LLM output string you passed to `guard()`.
      render: text
    validations:
      required: true

  - type: textarea
    id: schema
    attributes:
      label: Zod Schema
      description: The Zod schema you used.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include the full `guard()` result if possible.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Reforge Version
      description: Run `npm list reforge-ai` to check.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
        - Deno
        - Cloudflare Workers
        - Vercel Edge
        - Browser
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any additional context, screenshots, or logs.
